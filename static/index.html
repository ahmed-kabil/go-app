<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Backend Service</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Using Go's signature light-blue/cyan palette with a modern dark twist */
            background: radial-gradient(circle at center, #1a2a33 0%, #000000 100%);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            /* Go's official Gopher Blue color #00ADD8 */
            border: 1px solid rgba(0, 173, 216, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 173, 216, 0.1);
            max-width: 500px;
            position: relative;
        }

        /* Decorative "Gopher" accent */
        .container::before {
            content: "";
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #00ADD8;
            border-radius: 10px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            /* Go Blue Gradient */
            background: linear-gradient(135deg, #00ADD8, #ade6f3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.25rem;
            color: #d1d1d1;
            margin: 15px 0;
            font-weight: 300;
        }

        .highlight {
            color: #00ADD8;
            font-weight: 600;
        }

        .tagline {
            color: #8899a6;
            font-weight: 400;
            font-size: 0.95rem;
            margin-top: 20px;
            display: block;
            font-family: 'Courier New', Courier, monospace;
        }

        .badge {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 24px;
            background: rgba(0, 173, 216, 0.15);
            color: #00ADD8;
            border: 1.5px solid #00ADD8;
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
        }

        .badge:hover {
            background: #00ADD8;
            color: #000;
            cursor: default;
        }

        /* Subtle pulse animation for the glow */
        @keyframes glow {
            0% { border-color: rgba(0, 173, 216, 0.3); }
            50% { border-color: rgba(0, 173, 216, 0.6); }
            100% { border-color: rgba(0, 173, 216, 0.3); }
        }

        .container {
            animation: glow 4s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from Go</h1>
        <p>Your <span class="highlight">Compiled</span> binary is live.</p>
        <span class="tagline">Concurrency. Simplicity. Performance.</span>
        <div class="badge">Powered by Go Standard Lib</div>
    </div>
</body>
</html>
